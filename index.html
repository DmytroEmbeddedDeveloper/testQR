<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR RSA Scanner PRO</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #1e88e5;
    color: white;
}
</style>
</head>

<body>

<button id="startBtn">Start Scanner</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- MODAL -->
<div class="modal fade" id="qrModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">QR Verification</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <table class="table table-dark table-sm">
          <tbody id="qrBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>

const btn = document.getElementById("startBtn");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

const modal = new bootstrap.Modal(document.getElementById("qrModal"));
const qrBody = document.getElementById("qrBody");

let stream = null;
let scanning = false;
let processing = false;
let lastQR = null;
let lastScanTime = 0;
let publicKey = null;

// ================= LOG =================
function log(msg, data = null) {
    const time = new Date().toLocaleTimeString();
    console.log(`[${time}] ${msg}`, data || "");
}

// ================= LOAD KEY =================
async function loadKey() {

    const pem = `-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEArkpbPrYENPZgINWoQeCM
R+HWh8IWJx9Zyrpj+ODA6BMTRWORxYrKfcu4s4jSoj7KoDk3mptIrKpHdYRCSaLg
5WSifhjRTKZUNuL2O4Vyfe3eRZmz3EtwtbGN5zLlhmtOXMo9L8EQpsP//9Q+HisN
E2TnC0+2YEBXzgHRdLn/LP7TnfWiF8SEfa2x8k+PqnZHaRjonBpsXzji2ldUyOLf
ETZnYuQkaNIRhZcUNl6aze4ySwTGLycSw+YnipfEX95+MPoenE+PzmlAcl9Jo7t8
tFNsxpx00ockm9aKKa5a96ci/PgfTauFQ8IIvIvB0IafMYQL4VFDQ2/vOT14DOGC
qQIDAQAB
-----END PUBLIC KEY-----`;

    const binary = atob(pem.replace(/-----.*-----/g, '').replace(/\s/g, ''));
    const buffer = new Uint8Array([...binary].map(c => c.charCodeAt(0)));

    publicKey = await crypto.subtle.importKey(
        "spki",
        buffer.buffer,
        { name: "RSASSA-PKCS1-v1_5", hash: "SHA-256" },
        true,
        ["verify"]
    );
}

// ================= BASE64 =================
function base64ToBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

// ================= CANONICAL JSON =================
function canonicalJSON(obj) {
    return JSON.stringify(obj, Object.keys(obj).sort());
}

// ================= VERIFY =================
async function verify(dataObj, signatureB64) {

    const dataStr = canonicalJSON(dataObj);
    const data = new TextEncoder().encode(dataStr);
    const signature = base64ToBuffer(signatureB64);

    return await crypto.subtle.verify(
        "RSASSA-PKCS1-v1_5",
        publicKey,
        signature,
        data
    );
}

// ================= SHOW MODAL =================
function showModal(data, sign, valid) {

    qrBody.innerHTML = "";

    for (const [k, v] of Object.entries(data)) {
        qrBody.innerHTML += `<tr><td>${k}</td><td>${v}</td></tr>`;
    }

    qrBody.innerHTML += `<tr><td>signature</td><td style="word-break:break-all;">${sign}</td></tr>`;

    qrBody.innerHTML += valid
        ? `<tr><td>status</td><td style="color:#00ff88;">✔ VALID</td></tr>`
        : `<tr><td>status</td><td style="color:#ff4444;">❌ INVALID</td></tr>`;

    modal.show();
}

// ================= START =================
btn.onclick = async () => {

    btn.style.display = "none";

    await loadKey();

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    scanning = true;
    requestAnimationFrame(scan);
};

// ================= SCAN LOOP =================
function scan() {

    if (!scanning) return;

    const now = Date.now();

    // cooldown (500ms)
    if (now - lastScanTime < 500) {
        requestAnimationFrame(scan);
        return;
    }

    lastScanTime = now;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const image = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(image.data, image.width, image.height);

        if (code) {

            // 🔥 анти-дубль
            if (code.data === lastQR) {
                requestAnimationFrame(scan);
                return;
            }

            lastQR = code.data;

            if (processing) {
                requestAnimationFrame(scan);
                return;
            }

            processing = true;

            try {
                const parsed = JSON.parse(code.data);

                const data = parsed[0];
                const sign = parsed[1].sign;

                verify(data, sign).then(valid => {
                    showModal(data, sign, valid);
                });

            } catch (e) {
                console.log("QR FORMAT ERROR");
                processing = false;
            }
        }
    }

    requestAnimationFrame(scan);
}

// ================= RESET AFTER MODAL =================
document.getElementById('qrModal')
.addEventListener('hidden.bs.modal', () => {

    log("Modal closed → reset scanner");

    processing = false;
    lastQR = null;
});

</script>

</body>
</html>
